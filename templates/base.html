<!doctype html>
<html lang="fi" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}13F Tracker{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0d1117; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; }
    .card { border: 1px solid #30363d; background: #161b22; }
    .card-header { border-bottom: 1px solid #30363d; background: #1c2128; }
    .badge-new { background: #238636; }
    .badge-increase { background: #1f6feb; }
    .badge-decrease { background: #da3633; }
    .badge-exit { background: #6e7681; }
    .ytd-positive { color: #3fb950; }
    .ytd-negative { color: #f85149; }
    .analysis-box { background: #1c2128; border-left: 3px solid #388bfd; padding: 1rem; white-space: pre-wrap; font-size: .85rem; }
    table { font-size: .875rem; }
    .pct-cell { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary mb-4">
    <div class="container">
      <a class="navbar-brand" href="/">📊 13F Tracker</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="/">Etusivu</a>
        <a class="nav-link" href="/sauls">Saul's Board</a>
      </div>
    </div>
  </nav>
  <div class="container pb-5">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
